<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: false"
    embedded
    vr-mode-ui="enabled: false"
  >

    <a-camera cursor="rayOrigin: mouse"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">

      <a-image src="catfish1.png" position="-0.5 0 0"></a-image>
      <a-image src="catfish2.png" position="0.5 0 0"></a-image>
      <a-image src="catfish3.png" position="0 0.5 0"></a-image>

    </a-entity>

  </a-scene>

  <!-- スタート画面 -->
<div id="start" style="
  position: fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  z-index:9999;
  pointer-events: auto;
">
  タップしてARスタート
</div>

  <script src="script.js"></script>

</body>
</html>
