<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

    <script>
        let tappedCount = 0;

        // タップされた時の処理
        AFRAME.registerComponent('tap-handler', {
            init: function () {
                this.el.addEventListener('click', () => {
                    // 要素を消す
                    this.el.setAttribute('visible', false);
                    this.el.setAttribute('class', 'not-clickable'); // クリック判定から外す
                    
                    tappedCount++;

                    // 3体タップされたら説明カードを表示
                    if (tappedCount === 3) {
                        const card = document.querySelector('#info-card');
                        card.setAttribute('visible', true);
                        document.querySelector('#exit-button').style.display = 'block';
                    }
                });
            }
        });

        // 終了ボタン（リセット）
        function resetAR() {
            tappedCount = 0;
            // 全てのナマズを再表示
            document.querySelectorAll('.catfish').forEach(el => {
                el.setAttribute('visible', true);
                el.setAttribute('class', 'catfish clickable');
            });
            // カードを隠す
            document.querySelector('#info-card').setAttribute('visible', false);
            // ボタンを隠す
            document.querySelector('#exit-button').style.display = 'none';
        }
    </script>

    <button id="exit-button" onclick="resetAR()" style="display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; padding: 10px 20px; font-size: 18px; background: white; border-radius: 10px;">
        もう一度探す
    </button>

    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" cursor="fuse: false; rayOrigin: mouse;">
        
        <a-assets>
            <img id="cat1" src="catfish1.png">
            <img id="cat2" src="catfish2.png">
            <img id="cat3" src="catfish3.png">
            <img id="card" src="catfish.png">
        </a-assets>

        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-image src="#cat1" position="-1 0.5 0" rotation="-90 0 0" scale="0.8 0.8 0.8" class="catfish clickable" tap-handler></a-image>
            
            <a-image src="#cat2" position="0 0.5 -1" rotation="-90 0 0" scale="0.8 0.8 0.8" class="catfish clickable" tap-handler></a-image>
            
            <a-image src="#cat3" position="1 0.5 0" rotation="-90 0 0" scale="0.8 0.8 0.8" class="catfish clickable" tap-handler></a-image>

            <a-image id="info-card" src="#card" position="0 1 0" rotation="-90 0 0" scale="2 2 2" visible="false"></a-image>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
