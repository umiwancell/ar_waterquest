<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑 - スマホ対応版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #exit-button {
            display: none; position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 999; padding: 15px 30px; 
            font-size: 18px; background: #ffde59; border-radius: 50px; border: 2px solid #000;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

<script>
    let tappedCount = 0;

    AFRAME.registerComponent('tap-handler', {
        init: function () {
            // スマホのタッチ(touchstart)とクリック(click)両方に対応
            const handleTap = () => {
                if (this.el.parentElement.getAttribute('visible') === false) return;

                // 親要素（魚と土台のセット）を消す
                this.el.parentElement.setAttribute('visible', false);
                tappedCount++;

                if (tappedCount === 3) {
                    document.querySelector('#info-card').setAttribute('visible', true);
                    document.querySelector('#exit-button').style.display = 'block';
                }
            };

            this.el.addEventListener('click', handleTap);
            this.el.addEventListener('touchstart', handleTap);
        }
    });
</script>

<button id="exit-button" onclick="location.reload()">もういちど探す</button>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
         cursor="fuse: false; rayOrigin: mouse;"
         vr-mode-ui="enabled: false">
    
    <a-assets>
        <img id="cat1" src="catfish1.png">
        <img id="cat2" src="catfish2.png">
        <img id="cat3" src="catfish3.png">
        <img id="card" src="catfish.png">
    </a-assets>

    <a-marker preset="hiro">
        <a-entity position="-1 0.5 0.5">
            <a-image src="#cat1" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="0.8" material="opacity: 0.1; transparent: true; color: red" tap-handler></a-circle>
        </a-entity>

        <a-entity position="0 0.5 -1">
            <a-image src="#cat2" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="0.8" material="opacity: 0.1; transparent: true; color: red" tap-handler></a-circle>
        </a-entity>

        <a-entity position="1 0.5 0.5">
            <a-image src="#cat3" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="0.8" material="opacity: 0.1; transparent: true; color: red" tap-handler></a-circle>
        </a-entity>

        <a-image id="info-card" src="#card" position="0 1 0" rotation="-90 0 0" scale="2.5 1.8 1" visible="false"></a-image>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>
</body>
</html>
