<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑 - 最終調整版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #exit-button {
            display: none; position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 999; padding: 15px 30px; 
            font-size: 18px; background: #ffde59; border-radius: 50px; border: 2px solid #000;
        }
        /* 画面上部にデバッグ用の文字を出す（反応したか確認用） */
        #debug-log {
            position: fixed; top: 10px; left: 10px; z-index: 1000; background: rgba(0,0,0,0.5); color: white; padding: 5px; font-size: 12px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

<div id="debug-log">ステータス: 準備完了</div>
<button id="exit-button" onclick="location.reload()">もういちど探す</button>

<script>
    let tappedCount = 0;

    AFRAME.registerComponent('tap-handler', {
        init: function () {
            // mousedown はスマホのタッチ開始時にも反応します
            this.el.addEventListener('mousedown', (e) => {
                // 親要素（a-entity）を取得
                const parent = this.el.parentNode;
                
                if (parent.getAttribute('visible') === false) return;

                // ログを表示（動いているか確認用）
                document.getElementById('debug-log').innerText = "タップ検知！: " + (tappedCount + 1);

                parent.setAttribute('visible', false);
                tappedCount++;

                if (tappedCount === 3) {
                    document.querySelector('#info-card').setAttribute('visible', true);
                    document.querySelector('#exit-button').style.display = 'block';
                }
            });
        }
    });
</script>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
         vr-mode-ui="enabled: false">
    
    <a-assets>
        <img id="cat1" src="catfish1.png">
        <img id="cat2" src="catfish2.png">
        <img id="cat3" src="catfish3.png">
        <img id="card" src="catfish.png">
    </a-assets>

    <a-marker preset="hiro" emitevents="true">
        <a-entity position="-1 0.6 0.5">
            <a-image src="#cat1" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="1.0" 
                      material="opacity: 0; transparent: true" tap-handler></a-circle>
        </a-entity>

        <a-entity position="0 0.6 -1.2">
            <a-image src="#cat2" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="1.0" 
                      material="opacity: 0; transparent: true" tap-handler></a-circle>
        </a-entity>

        <a-entity position="1 0.6 0.5">
            <a-image src="#cat3" rotation="-90 0 0" scale="1 1 1"></a-image>
            <a-circle class="clickable" rotation="-90 0 0" radius="1.0" 
                      material="opacity: 0; transparent: true" tap-handler></a-circle>
        </a-entity>

        <a-image id="info-card" src="#card" position="0 1.2 0" rotation="-90 0 0" scale="2.8 2.0 1" visible="false"></a-image>
    </a-marker>

    <a-entity camera>
        <a-entity cursor="fuse: false; rayOrigin: mouse;"
                  raycaster="objects: .clickable; interval: 10;">
        </a-entity>
    </a-entity>
</a-scene>
</body>
</html>
