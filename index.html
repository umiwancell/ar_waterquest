<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑 - 最終調整版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-at-component.min.js"></script>
    
    <style>
        /* 画面上のUIデザイン */
        #status-display {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px;
            border-radius: 25px; font-family: sans-serif; z-index: 1000; text-align: center;
            font-size: 16px;
        }
        #exit-button {
            display: none; position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 1000; padding: 15px 40px;
            font-size: 18px; font-weight: bold; background: #ffde59;
            border: 3px solid #000; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="status-display">画面中央の「〇」をナマズに合わせてタップしてね！</div>
    <button id="exit-button" onclick="location.reload()">もういちど探す</button>

    <script>
        let tappedCount = 0;

        // タップ検知コンポーネント
        AFRAME.registerComponent('fish-catcher', {
            init: function () {
                // 中心カーソル方式では 'click' が安定します
                this.el.addEventListener('click', () => {
                    const parentFish = this.el.parentNode; // 親のa-entity（魚）を取得
                    if (parentFish.getAttribute('visible') === false) return;

                    // 魚を消す
                    parentFish.setAttribute('visible', false);
                    tappedCount++;

                    // ステータス更新
                    const status = document.getElementById('status-display');
                    if (tappedCount < 3) {
                        status.innerText = `あと ${3 - tappedCount} 匹！`;
                    } else {
                        status.innerText = "コンプリート！解説を読んでね";
                        document.querySelector('#info-card').setAttribute('visible', true);
                        document.querySelector('#exit-button').style.display = 'block';
                    }
                });
            }
        });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="cat1" src="catfish1.png">
            <img id="cat2" src="catfish2.png">
            <img id="cat3" src="catfish3.png">
            <img id="card" src="catfish.png">
        </a-assets>

        <a-marker preset="marker.patt" emitevents="true">
            
            <a-entity position="-1.5 0.8 0.5" look-at="#main-camera">
                <a-image src="#cat1" scale="1.5 1.5 1"></a-image>
                <a-box scale="1.5 1.5 0.3" material="opacity: 0; transparent: true" class="clickable" fish-catcher></a-box>
            </a-entity>

            <a-entity position="0 1.2 -1.5" look-at="#main-camera">
                <a-image src="#cat2" scale="1.5 1.5 1"></a-image>
                <a-box scale="1.5 1.5 0.3" material="opacity: 0; transparent: true" class="clickable" fish-catcher></a-box>
            </a-entity>

            <a-entity position="1.2 0.5 0.5" look-at="#main-camera">
                <a-image src="#cat3" scale="1.5 1.5 1"></a-image>
                <a-box scale="1.5 1.5 0.3" material="opacity: 0; transparent: true" class="clickable" fish-catcher></a-box>
            </a-entity>

            <a-entity id="info-card" position="0 2.0 0" look-at="#main-camera" visible="false">
                <a-image src="#card" scale="4.0 3.0 1"></a-image>
            </a-entity>

        </a-marker>

        <a-entity camera id="main-camera">
            <a-entity cursor="fuse: false; rayOrigin: entity;"
                      raycaster="objects: .clickable; interval: 10;"
                      position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                      material="color: #ffde59; shader: flat; opacity: 0.8">
            </a-entity>
        </a-entity>

    </a-scene>

</body>
</html>
