<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑 - 修正版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #exit-button {
            display: none; position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 999; padding: 15px 30px; 
            font-size: 18px; background: #ffde59; border-radius: 50px; border: 2px solid #000;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <script>
        let tappedCount = 0;

        AFRAME.registerComponent('tap-handler', {
            init: function () {
                // clickイベントをリッスン
                this.el.addEventListener('mousedown', (e) => {
                    if (this.el.getAttribute('visible') === false) return;

                    // 消す
                    this.el.setAttribute('visible', false);
                    tappedCount++;
                    console.log("Tapped! Count: " + tappedCount);

                    if (tappedCount === 3) {
                        document.querySelector('#info-card').setAttribute('visible', true);
                        document.querySelector('#exit-button').style.display = 'block';
                    }
                });
            }
        });

        function resetGame() {
            location.reload(); // 一番確実なリセット方法（画面更新）
        }
    </script>

    <button id="exit-button" onclick="resetGame()">もういちど探す</button>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             cursor="fuse: false; rayOrigin: mouse;"
             vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="cat1" src="catfish1.png">
            <img id="cat2" src="catfish2.png">
            <img id="cat3" src="catfish3.png">
            <img id="card" src="catfish.png">
        </a-assets>

        <a-marker preset="hiro">
            
            <a-image class="target-fish" src="#cat1" 
                     position="-1 0.5 0.5" rotation="-90 0 0" scale="1 1 1" 
                     tap-handler></a-image>
            
            <a-image class="target-fish" src="#cat2" 
                     position="0 0.5 -1" rotation="-90 0 0" scale="1 1 1" 
                     tap-handler></a-image>
            
            <a-image class="target-fish" src="#cat3" 
                     position="1 0.5 0.5" rotation="-90 0 0" scale="1 1 1" 
                     tap-handler></a-image>

            <a-image id="info-card" src="#card" 
                     position="0 1 0" rotation="-90 0 0" scale="2.5 1.8 1" 
                     visible="false"></a-image>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
