<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑 - 最終解決版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #exit-button {
            display: none; position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%); z-index: 999; padding: 15px 30px; 
            font-size: 18px; background: #ffde59; border-radius: 50px; border: 2px solid #000;
        }
        #status {
            position: fixed; top: 10px; left: 10px; z-index: 1000; 
            background: rgba(0,0,0,0.7); color: white; padding: 10px; font-size: 14px; border-radius: 5px;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

<div id="status">ナマズを3匹見つけてタップしてね</div>
<button id="exit-button" onclick="location.reload()">もういちど探す</button>

<script>
    let tappedCount = 0;

    // タップ処理のコンポーネント
    AFRAME.registerComponent('fish-tap', {
        init: function () {
            // mousedown (指が触れた瞬間) を使用
            this.el.addEventListener('mousedown', () => {
                if (this.el.getAttribute('visible') === false) return;

                // 消去処理
                this.el.setAttribute('visible', false);
                tappedCount++;
                
                document.getElementById('status').innerText = `あと ${3 - tappedCount} 匹！`;

                if (tappedCount === 3) {
                    document.getElementById('status').innerText = "全部つかまえた！";
                    document.querySelector('#info-card').setAttribute('visible', true);
                    document.querySelector('#exit-button').style.display = 'block';
                }
            });
        }
    });
</script>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
         cursor="fuse: false; rayOrigin: mouse;" 
         vr-mode-ui="enabled: false">
    
    <a-assets>
        <img id="cat1" src="catfish1.png">
        <img id="cat2" src="catfish2.png">
        <img id="cat3" src="catfish3.png">
        <img id="card" src="catfish.png">
    </a-assets>

    <a-marker preset="hiro">
        <a-box class="clickable" fish-tap 
               position="-1 0.5 0.5" rotation="0 0 0" scale="1 0.1 1"
               src="#cat1" material="transparent: true; alphaTest: 0.5"></a-box>
        
        <a-box class="clickable" fish-tap 
               position="0 0.5 -1" rotation="0 0 0" scale="1 0.1 1"
               src="#cat2" material="transparent: true; alphaTest: 0.5"></a-box>
        
        <a-box class="clickable" fish-tap 
               position="1 0.5 0.5" rotation="0 0 0" scale="1 0.1 1"
               src="#cat3" material="transparent: true; alphaTest: 0.5"></a-box>

        <a-image id="info-card" src="#card" 
                 position="0 1.2 0" rotation="-90 0 0" scale="2.8 2.0 1" 
                 visible="false"></a-image>

    </a-marker>

    <a-entity camera></a-entity>
</a-scene>
</body>
</html>
