<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR Animal</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/npm/ar.js@3.4.0/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #resetBtn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: white;
      border-radius: 10px;
      display: none;
    }
  </style>
</head>

<body>

<button id="resetBtn">もう一度</button>

<a-scene embedded arjs cursor="rayOrigin: mouse">
  
  <!-- マーカー -->
  <a-marker type="pattern" url="marker.patt">

    <!-- 動物① -->
    <a-image src="catfish1.png" position="-1 0 0" class="animal"></a-image>

    <!-- 動物② -->
    <a-image src="catfish2.png" position="0 0 0" class="animal"></a-image>

    <!-- 動物③ -->
    <a-image src="catfish3.png" position="1 0 0" class="animal"></a-image>

    <!-- 説明カード -->
    <a-plane id="infoCard"
             position="0 1 0"
             width="2"
             height="1"
             color="white"
             visible="false">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<script>
let tappedCount = 0;
const animals = document.querySelectorAll('.animal');
const card = document.getElementById('infoCard');
const resetBtn = document.getElementById('resetBtn');

// タップ処理
animals.forEach(animal => {
  animal.addEventListener('click', () => {
    if (animal.getAttribute('visible')) {
      animal.setAttribute('visible', false);
      tappedCount++;

      if (tappedCount === 3) {
        card.setAttribute('visible', true);
        resetBtn.style.display = "block";
      }
    }
  });
});

// リセット
resetBtn.addEventListener('click', () => {
  tappedCount = 0;

  animals.forEach(animal => {
    animal.setAttribute('visible', true);
  });

  card.setAttribute('visible', false);
  resetBtn.style.display = "none";
});
</script>

</body>
</html>
