<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>ナマズAR図鑑</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* 終了ボタンのスタイル */
        #exit-button {
            display: none; 
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 999; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            background: #ffde59; 
            border: 2px solid #000;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <script>
        let tappedCount = 0;

        // タップ判定用のコンポーネント登録
        AFRAME.registerComponent('tap-handler', {
            init: function () {
                this.el.addEventListener('click', () => {
                    // すでに非表示なら無視
                    if (this.el.getAttribute('visible') === false) return;

                    // タップされたナマズを消す
                    this.el.setAttribute('visible', false);
                    tappedCount++;

                    // 3体すべて消えたらカードを表示
                    if (tappedCount === 3) {
                        const card = document.querySelector('#info-card');
                        card.setAttribute('visible', true);
                        // 終了ボタンを表示
                        document.querySelector('#exit-button').style.display = 'block';
                    }
                });
            }
        });

        // リセット機能（もう一度遊ぶ）
        function resetGame() {
            tappedCount = 0;
            // ナマズを復活させる
            document.querySelectorAll('.target-fish').forEach(fish => {
                fish.setAttribute('visible', true);
            });
            // カードを隠す
            document.querySelector('#info-card').setAttribute('visible', false);
            // ボタンを隠す
            document.querySelector('#exit-button').style.display = 'none';
        }
    </script>

    <button id="exit-button" onclick="resetGame()">
        もういちど探す
    </button>

    <a-scene embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;" 
             cursor="fuse: false; rayOrigin: mouse;"
             vr-mode-ui="enabled: false">
        
        <a-assets>
            <img id="cat1" src="catfish1.png">
            <img id="cat2" src="catfish2.png">
            <img id="cat3" src="catfish3.png">
            <img id="card" src="catfish.png">
        </a-assets>

        <a-marker preset="marker.patt">
            
            <a-image class="target-fish" src="#cat1" 
                     position="-0.8 0.5 0" rotation="-90 0 0" scale="0.7 0.7 0.7" 
                     tap-handler></a-image>
            
            <a-image class="target-fish" src="#cat2" 
                     position="0 0.5 -0.8" rotation="-90 0 0" scale="0.7 0.7 0.7" 
                     tap-handler></a-image>
            
            <a-image class="target-fish" src="#cat3" 
                     position="0.8 0.5 0" rotation="-90 0 0" scale="0.7 0.7 0.7" 
                     tap-handler></a-image>

            <a-image id="info-card" src="#card" 
                     position="0 0.8 0" rotation="-90 0 0" scale="2.5 1.8 1" 
                     visible="false"></a-image>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

</body>
</html>
