<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>タイの水生生物AR図鑑</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #status-display {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 10px 20px;
            border-radius: 25px; z-index: 1000; text-align: center; font-family: sans-serif;
        }
        #exit-button {
            display: none; position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%); z-index: 1000; padding: 15px 40px;
            background: #ffde59; border: 3px solid #000; border-radius: 50px; font-weight: bold;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="status-display">マーカーをさがしてね！</div>
    <button id="exit-button" onclick="location.reload()">もういちど探す</button>

    <script>
        // すべての動物を3匹（target: 3）に設定
        let counts = { umigame:0, kumanomi:0, jinbei:0, namazu:0, thirapia:0, tobihaze:0, kaeru:0 };
        const targetCount = 3;

        AFRAME.registerComponent('animal-catcher', {
            schema: { type: {default: ''} },
            init: function () {
                this.el.addEventListener('click', () => {
                    const parent = this.el.parentNode;
                    if (parent.getAttribute('visible') === false) return;

                    parent.setAttribute('visible', false);
                    const id = this.data.type;
                    counts[id]++;
                    
                    document.getElementById('status-display').innerText = `あと ${targetCount - counts[id]} 匹！`;

                    if (counts[id] === targetCount) {
                        const card = document.getElementById(`card-${id}`);
                        if(card) card.setAttribute('visible', true);
                        document.querySelector('#exit-button').style.display = 'block';
                        document.getElementById('status-display').innerText = "コンプリート！";
                    }
                });
            }
        });
    </script>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" 
             vr-mode-ui="enabled: false" renderer="logarithmicDepthBuffer: true;">
        
        <a-assets>
            <img id="u1" src="umigame1.png"><img id="u2" src="umigame2.png"><img id="u3" src="umigame3.png"><img id="u-c" src="umigame.png">
            <img id="k1" src="kumanomi1.PNG"><img id="k2" src="kumanomi2.PNG"><img id="k3" src="kumanomi3.PNG"><img id="k-c" src="kumanomi.png">
            <img id="j1" src="jinbei1.PNG"><img id="j2" src="jinbei2.PNG"><img id="j3" src="jinbei3.png"><img id="j-c" src="jinbei.png">
            <img id="n1" src="namazu1.png"><img id="n2" src="namazu2.png"><img id="n3" src="namazu3.png"><img id="n-c" src="namazu.png">
            <img id="t1" src="thirapia1.PNG"><img id="t2" src="thirapia2.png"><img id="t3" src="thirapia3.png"><img id="t-c" src="thirapia.png">
            <img id="h1" src="tobihaze1.PNG"><img id="h2" src="tobihaze2.PNG"><img id="h3" src="tobihaze3.PNG"><img id="h-c" src="tobihaze.png">
            <img id="f1" src="kaeru1.png"><img id="f2" src="kaeru2.png"><img id="f3" src="kaeru3.png"><img id="f-c" src="kaeru.png">
        </a-assets>

        <script>
            // 動物リストとアセットIDの対応
            const animals = [
                {id: 'umigame', patt: 'umigame.patt', imgs: ['#u1', '#u2', '#u3'], card: '#u-c'},
                {id: 'kumanomi', patt: 'kumanomi.patt', imgs: ['#k1', '#k2', '#k3'], card: '#k-c'},
                {id: 'jinbei', patt: 'jinbei.patt', imgs: ['#j1', '#j2', '#j3'], card: '#j-c'},
                {id: 'namazu', patt: 'namazu.patt', imgs: ['#n1', '#n2', '#n3'], card: '#n-c'},
                {id: 'thirapia', patt: 'thirapia.patt', imgs: ['#t1', '#t2', '#t3'], card: '#t-c'},
                {id: 'tobihaze', patt: 'tobihaze.patt', imgs: ['#h1', '#h2', '#h3'], card: '#h-c'},
                {id: 'kaeru', patt: 'kaeru.patt', imgs: ['#f1', '#f2', '#f3'], card: '#f-c'}
            ];

            // マーカー要素を自動生成してHTMLに出力
            animals.forEach(a => {
                document.write(`
                    <a-marker type="pattern" url="${a.patt}">
                        <a-entity position="-1 0.5 0.5" rotation="-90 0 0"><a-image src="${a.imgs[0]}"></a-image><a-box class="clickable" animal-catcher="type:${a.id}" material="opacity:0;transparent:true" scale="1.2 1.2 0.2"></a-box></a-entity>
                        <a-entity position="0 0.5 -1" rotation="-90 0 0"><a-image src="${a.imgs[1]}"></a-image><a-box class="clickable" animal-catcher="type:${a.id}" material="opacity:0;transparent:true" scale="1.2 1.2 0.2"></a-box></a-entity>
                        <a-entity position="1 0.5 0.5" rotation="-90 0 0"><a-image src="${a.imgs[2]}"></a-image><a-box class="clickable" animal-catcher="type:${a.id}" material="opacity:0;transparent:true" scale="1.2 1.2 0.2"></a-box></a-entity>
                        <a-image id="card-${a.id}" src="${a.card}" position="0 1.5 0" rotation="-90 0 0" scale="3.5 2.5 1" visible="false"></a-image>
                    </a-marker>
                `);
            });
        </script>

        <a-entity camera id="main-camera">
            <a-entity cursor="fuse: false; rayOrigin: entity;" raycaster="objects: .clickable;" position="0 0 -1"
                      geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #ffde59; shader: flat; opacity: 0.8">
            </a-entity>
        </a-entity>
    </a-scene>
</body>
</html>
